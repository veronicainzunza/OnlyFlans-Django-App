{% extends 'base.html' %}

{% block titulopestana %}Bienvenido a onlyflans{% endblock %}

{% block contenido %}
<div class="container">
    <div class="row">
        {% for flan in flanes %}
            <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                <div class="card h-100"> 
                    <!--<img src="{{ flan.image_url }}" class="card-img-top" alt="{{ flan.name }}">-->
                    <a href="{% url 'detalle_flan' flan.id %}">
                        <img src="{{  flan.image.url }}" class="card-img-top fixed-size" alt="{{ flan.name }}">
                    </a>
                    <div class="card-body">
                        <h5 class="card-title text-center">{{ flan.name }}</h5>
                        <p class="card-text">{{ flan.description }}</p>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
