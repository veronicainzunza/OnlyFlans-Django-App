{% extends 'base.html' %}

{% block titulopestana %}Bienvenido a onlyflans{% endblock %}

{% block contenido %}

    <style>
        #map {
            height: 500px; /* Puedes ajustar la altura según tus necesidades */
            width: 100%;
        }
    </style>


 
    <h2 style="text-align: center;">Cobertura del Despacho</h2>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-33.0458, -71.6197], 10); // Coordenadas de Valparaíso, 5ª región de Chile

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        L.marker([-33.0458, -71.6197]).addTo(map)
            .bindPopup('Valparaíso, 5ª Región de Chile')
            .openPopup();
        
        // Coordenadas ficticias para un polígono (reemplazar con coordenadas reales) 
        var comunaCoords = [
            [-33.02457,	-71.55183]
        ];

        var comunaPolygon = L.polygon(comunaCoords, {
            color: 'blue',
            fillColor: 'blue',
            fillOpacity: 0.3
        }).addTo(map);

        comunaPolygon.bindPopup('Viña del Mar');
    </script>


{% endblock %}
