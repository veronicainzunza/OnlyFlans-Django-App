{% extends 'base.html' %}

{% block titulopestana %}Detalle de {{ flan.name }}{% endblock %}

{% block contenido %}
<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8"> 
            <div class="card h-100">
                <div class="row g-0">
                    <div class="col-md-4">
                        <img src="{{ flan.image.url }}" class="img-fluid rounded-start" alt="{{ flan.name }}">
                    </div>
                    <div class="col-md-8">
                        <div class="card-body">
                            <h5 class="card-title">{{ flan.name }}</h5>
                            <p class="card-text">{{ flan.description }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
